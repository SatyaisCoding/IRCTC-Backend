version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: irctc-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    networks:
      - irctc-network

  redis:
    image: redis:7-alpine
    container_name: irctc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - irctc-network

  # 1. User Microservice (Port 8084)
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/irctc_user
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - JWT_SECRET=9263FD51303D4A30A4058DB04EA668A7836D4862590E6B97A0A9C2C3AA817A547846A310243E4B898C6D12E6B65B5EAEFE12
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - irctc-network

  # 2. Notification Microservice (Port 8085)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=placeholder-email@gmail.com
      - SPRING_MAIL_PASSWORD=your-app-specific-password
    restart: unless-stopped
    networks:
      - irctc-network

  # 3. Booking Microservice (Port 8081)
  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/irctc_booking
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - irctc-network

  # 4. Payment Microservice (Port 8082)
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/irctc_payment
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - irctc-network

  # 5. Search Microservice (Port 8083)
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/irctc_search
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - irctc-network

volumes:
  postgres_data:
  redis_data:

networks:
  irctc-network:
    driver: bridge
