server:
  port: 8084
  servlet:
    context-path: /
  shutdown: graceful

spring:
  application:
    name: user-service
  lifecycle:
    timeout-per-shutdown-phase: 15s
  
  # Database Configuration (PostgreSQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/irctc_user}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  # Spring Data JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate # Database structure is managed exclusively by Flyway
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Flyway Database Migration Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}

  # Apache Kafka Producer Configuration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        acks: all
        retries: 3
        max.in.flight.requests.per.connection: 1

  # OAuth2 Client Configuration (Google Authentication Placeholder)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-mock-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-mock-client-secret}
            scope:
              - email
              - profile

# Actuator Monitoring Configurations
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Custom Security & Remote Service Properties
app:
  jwt:
    # 512-bit HS512 secret string, generated for production grade security
    secret: ${JWT_SECRET:9263FD51303D4A30A4058DB04EA668A7836D4862590E6B97A0A9C2C3AA817A547846A310243E4B898C6D12E6B65B5EAEFE12}
    accessTokenExpirationMs: ${JWT_ACCESS_EXPIRATION_MS:900000}       # 15 Minutes
    refreshTokenExpirationMs: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 Days
  otp:
    expirationMinutes: 5
  services:
    # URL pointing to the decoupled notification microservice
    notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
  kafka:
    topics:
      otp-notification: notification.email.otp
      welcome-notification: notification.email.welcome

